x-common-variables: &db-variables
  POSTGRES_NAME: postgres
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: jacksonmadden
  STORAGE_ACCESS_KEY: dev
  STORAGE_SECRET_KEY: rickbailey

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
      - "5678:5678"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
      POSTGRES_HOST: db
      STORAGE_HOST: storage:9000
      DJANGO_DEBUG: 1
      RUN_CELERY_IN_WEB: 0
      C_FORCE_ROOT: 1
      <<: *db-variables
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_healthy
      redis:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    volumes:
      - .:/app

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      STORAGE_HOST: storage:9000
      DJANGO_DEBUG: 1
      RUN_CELERY_IN_WEB: 0
      C_FORCE_ROOT: 1
      <<: *db-variables
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_healthy
      redis:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      vllm:
        condition: service_healthy
        required: false
    volumes:
      - .:/app
    command: sh -c "cd /app/aquillm && celery -A aquillm worker --loglevel=info"



  db:
    image: pgvector/pgvector:0.8.0-pg17
    environment:
      <<: *db-variables
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s



  storage:
    image: minio/minio
    restart: unless-stopped
    ports: 
      - "9001:9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: dev
      MINIO_ROOT_PASSWORD: rickbailey

    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', '-I', 'localhost:9000/minio/health/live']
      interval: 5s
      timeout: 10s
      start_period: 15s
    command: minio server /data --console-address ":9001"

  createbuckets:
    image: minio/mc
    depends_on:
      storage:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set aquillm http://storage:9000 dev rickbailey;
      /usr/bin/mc mb aquillm/aquillm;
      exit 0;"

  redis:
    image: redis:7.4-bookworm

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  vllm:
    build:
      context: .
      dockerfile: Dockerfile.vllm
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
    restart: unless-stopped
    profiles:
      - vllm
    env_file:
      - .env
    environment:
      - VLLM_HOST=0.0.0.0
      - VLLM_PORT=8000
      - VLLM_TENSOR_PARALLEL_SIZE=1
      - VLLM_MAX_MODEL_LEN=${VLLM_MAX_MODEL_LEN:-8192}
      - VLLM_EXTRA_ARGS=${VLLM_EXTRA_ARGS:-}
      - VLLM_TRUST_REMOTE_CODE=${VLLM_TRUST_REMOTE_CODE:-0}
    ports:
      - "8000:8000"
    volumes:
      - vllm_data:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  vllm_mem0:
    build:
      context: .
      dockerfile: Dockerfile.vllm
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
    restart: unless-stopped
    profiles:
      - vllm
    env_file:
      - .env
    environment:
      - VLLM_HOST=0.0.0.0
      - VLLM_PORT=8000
      - VLLM_MODEL=${MEM0_LLM_VLLM_MODEL:-mradermacher/Qwen3.5-4B-Gemini-Pro-HighIQ-THINKING-i1-GGUF:i1-Q4_K_M}
      - VLLM_SERVED_MODEL_NAME=${MEM0_LLM_MODEL:-qwen3.5:4b-q8_0}
      - VLLM_TENSOR_PARALLEL_SIZE=${MEM0_LLM_TENSOR_PARALLEL_SIZE:-1}
      - VLLM_GPU_MEMORY_UTILIZATION=${MEM0_LLM_GPU_MEMORY_UTILIZATION:-0.45}
      - VLLM_MAX_MODEL_LEN=${MEM0_LLM_MAX_MODEL_LEN:-4096}
      - VLLM_EXTRA_ARGS=${MEM0_LLM_VLLM_EXTRA_ARGS:-}
      - VLLM_TRUST_REMOTE_CODE=${MEM0_LLM_VLLM_TRUST_REMOTE_CODE:-0}
    ports:
      - "8001:8000"
    volumes:
      - vllm_data:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  vllm_embed:
    build:
      context: .
      dockerfile: Dockerfile.vllm
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
    restart: unless-stopped
    profiles:
      - vllm
    env_file:
      - .env
    environment:
      - VLLM_HOST=0.0.0.0
      - VLLM_PORT=8000
      - VLLM_MODEL=${MEM0_EMBED_VLLM_MODEL:-nomic-ai/nomic-embed-text-v1.5}
      - VLLM_SERVED_MODEL_NAME=${MEM0_EMBED_MODEL:-nomic-ai/nomic-embed-text-v1.5}
      - VLLM_RUNNER=pooling
      - VLLM_TENSOR_PARALLEL_SIZE=${MEM0_EMBED_TENSOR_PARALLEL_SIZE:-1}
      - VLLM_GPU_MEMORY_UTILIZATION=${MEM0_EMBED_GPU_MEMORY_UTILIZATION:-0.2}
      - VLLM_MAX_MODEL_LEN=${MEM0_EMBED_MAX_MODEL_LEN:-8192}
      - VLLM_EXTRA_ARGS=${MEM0_EMBED_VLLM_EXTRA_ARGS:-}
      - VLLM_TRUST_REMOTE_CODE=${MEM0_EMBED_VLLM_TRUST_REMOTE_CODE:-1}
    ports:
      - "8002:8000"
    volumes:
      - vllm_data:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s


volumes:
  postgres_data:
  minio_data:
  vllm_data:
