{% extends "aquillm/base.html" %}

{% block title %}Email Whitelist{% endblock %}

{% block nav_extra %}
{% if user.is_superuser %}
<a
    href="{% url 'api_feedback_ratings_csv' %}"
    class="inline-flex h-[40px] shrink-0 items-center gap-2 rounded-[12px] border border-scheme-contrast px-3 text-sm font-medium text-slight_muted_white hover:bg-scheme-shade_6 transition-all no-underline"
    title="Download feedback ratings as CSV"
    data-testid="download-feedback-csv"
>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 opacity-90" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    <span class="hidden sm:inline">Download Feedback CSV</span>
    <span class="sm:hidden">CSV</span>
</a>
{% endif %}
{% endblock %}

{% block content %}
    <div id="react-test"></div>
{% endblock %}

{% block scripts %}
<script>
    mountReactComponent('react-test', 'WhitelistEmails', {});
</script>
{% endblock %}
