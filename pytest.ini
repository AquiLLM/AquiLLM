[pytest]
DJANGO_SETTINGS_MODULE = aquillm.settings
pythonpath = aquillm
python_files = test_*.py
addopts = --strict-markers
asyncio_mode = auto
testpaths =
    aquillm/tests
    aquillm/apps/chat/tests
    aquillm/apps/documents/tests
    aquillm/apps/ingestion/tests
    aquillm/apps/platform_admin/tests
    aquillm/lib/llm/tests
    aquillm/lib/memory/tests
    chat/tests
    tests
markers =
    unit: fast unit tests
    e2e: End-to-end browser tests (require Playwright and live server)
