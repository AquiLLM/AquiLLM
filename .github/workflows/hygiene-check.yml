name: hygiene-check

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tracked banned paths
        shell: pwsh
        run: pwsh -ExecutionPolicy Bypass -File scripts/check_hygiene.ps1
