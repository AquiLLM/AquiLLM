x-common-variables: &db-variables
  POSTGRES_NAME: postgres
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: jacksonmadden
  STORAGE_ACCESS_KEY: dev
  STORAGE_SECRET_KEY: rickbailey

services:
  web:
    build:
      context: ../..
      dockerfile: deploy/docker/web/Dockerfile
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
      - "5678:5678"
    env_file:
      - ../../.env
    environment:
      PORT: ${PORT:-8080}
      POSTGRES_HOST: db
      STORAGE_HOST: storage:9000
      DJANGO_DEBUG: 1
      RUN_CELERY_IN_WEB: 0
      C_FORCE_ROOT: 1
      <<: *db-variables
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_healthy
      redis:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      vllm:
        condition: service_healthy
        required: false
      vllm_ocr:
        condition: service_healthy
        required: false
      vllm_transcribe:
        condition: service_healthy
        required: false
      vllm_embed:
        condition: service_healthy
        required: false
      vllm_rerank:
        condition: service_healthy
        required: false
    volumes:
      - ../..:/app

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/web/Dockerfile
    env_file:
      - ../../.env
    environment:
      POSTGRES_HOST: db
      STORAGE_HOST: storage:9000
      DJANGO_DEBUG: 1
      RUN_CELERY_IN_WEB: 0
      C_FORCE_ROOT: 1
      <<: *db-variables
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_healthy
      redis:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      vllm:
        condition: service_healthy
        required: false
      vllm_ocr:
        condition: service_healthy
        required: false
      vllm_transcribe:
        condition: service_healthy
        required: false
      vllm_embed:
        condition: service_healthy
        required: false
      vllm_rerank:
        condition: service_healthy
        required: false
    volumes:
      - ../..:/app
    command: sh -c "cd /app/aquillm && celery -A aquillm worker --loglevel=info"



  db:
    image: pgvector/pgvector:0.8.0-pg17
    environment:
      <<: *db-variables
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s



  storage:
    image: minio/minio
    restart: unless-stopped
    ports: 
      - "9001:9001"
    env_file:
      - ../../.env
    environment:
      MINIO_ROOT_USER: dev
      MINIO_ROOT_PASSWORD: rickbailey

    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', '-I', 'localhost:9000/minio/health/live']
      interval: 5s
      timeout: 10s
      start_period: 15s
    command: minio server /data --console-address ":9001"

  createbuckets:
    image: minio/mc
    depends_on:
      storage:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set aquillm http://storage:9000 dev rickbailey;
      /usr/bin/mc mb aquillm/aquillm;
      exit 0;"

  redis:
    image: redis:7.4-bookworm

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  vllm:
    build:
      context: ../..
      dockerfile: deploy/docker/vllm/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
    restart: unless-stopped
    profiles:
      - vllm
    env_file:
      - ../../.env
    environment:
      # Do not set VLLM_MAX_MODEL_LEN / VLLM_EXTRA_ARGS / VLLM_TRUST_REMOTE_CODE / TP here with
      # ${VAR:-default}: empty host interpolation overrides ../../.env and wipes long EXTRA_ARGS.
      - VLLM_HOST=0.0.0.0
      - VLLM_PORT=8000
      - LMCACHE_ENABLED=${LMCACHE_ENABLED:-0}
      - LMCACHE_EXTRA_ARGS=${LMCACHE_EXTRA_ARGS:-}
    ports:
      - "8000:8000"
    volumes:
      - vllm_data:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  vllm_ocr:
    build:
      context: ../..
      dockerfile: deploy/docker/vllm/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
    restart: unless-stopped
    profiles:
      - vllm
    depends_on:
      vllm:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - VLLM_HOST=0.0.0.0
      - VLLM_PORT=8000
      - VLLM_MODEL=${OCR_VLLM_MODEL:-Qwen/Qwen2.5-VL-7B-Instruct}
      - VLLM_SERVED_MODEL_NAME=${OCR_VLLM_SERVED_MODEL_NAME:-qwen-ocr}
      - VLLM_TOKENIZER=${OCR_VLLM_TOKENIZER:-Qwen/Qwen2.5-VL-7B-Instruct}
      - VLLM_TENSOR_PARALLEL_SIZE=${OCR_VLLM_TENSOR_PARALLEL_SIZE:-1}
      - VLLM_GPU_MEMORY_UTILIZATION=${OCR_VLLM_GPU_MEMORY_UTILIZATION:-0.2}
      - VLLM_MAX_MODEL_LEN=${OCR_VLLM_MAX_MODEL_LEN:-4096}
      # Blank overrides chat VLLM_EXTRA_ARGS from env_file (e.g. --reasoning-parser qwen3). vllm_start.sh fills from OCR_VLLM_EXTRA_ARGS.
      - VLLM_EXTRA_ARGS=
      - VLLM_TRUST_REMOTE_CODE=${OCR_VLLM_TRUST_REMOTE_CODE:-1}
    ports:
      - "8004:8000"
    volumes:
      - vllm_data:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  vllm_transcribe:
    build:
      context: ../..
      dockerfile: deploy/docker/vllm/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
    restart: unless-stopped
    profiles:
      - vllm
    depends_on:
      vllm_ocr:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - VLLM_HOST=0.0.0.0
      - VLLM_PORT=8000
      - VLLM_MODEL=${TRANSCRIBE_VLLM_MODEL:-openai/whisper-large-v3}
      - VLLM_SERVED_MODEL_NAME=${TRANSCRIBE_VLLM_SERVED_MODEL_NAME:-whisper-large-v3}
      - VLLM_TOKENIZER=${TRANSCRIBE_VLLM_TOKENIZER:-openai/whisper-large-v3}
      - VLLM_TENSOR_PARALLEL_SIZE=${TRANSCRIBE_VLLM_TENSOR_PARALLEL_SIZE:-1}
      - VLLM_GPU_MEMORY_UTILIZATION=${TRANSCRIBE_VLLM_GPU_MEMORY_UTILIZATION:-0.2}
      - VLLM_MAX_MODEL_LEN=${TRANSCRIBE_VLLM_MAX_MODEL_LEN:-4096}
      - VLLM_EXTRA_ARGS=
      - VLLM_TRUST_REMOTE_CODE=${TRANSCRIBE_VLLM_TRUST_REMOTE_CODE:-1}
    ports:
      - "8005:8000"
    volumes:
      - vllm_data:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  vllm_embed:
    build:
      context: ../..
      dockerfile: deploy/docker/vllm/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
    restart: unless-stopped
    profiles:
      - vllm
    depends_on:
      vllm_transcribe:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - VLLM_HOST=0.0.0.0
      - VLLM_PORT=8000
      - VLLM_MODEL=${MEM0_EMBED_VLLM_MODEL:-Qwen/Qwen3-Embedding-4B}
      - VLLM_SERVED_MODEL_NAME=${MEM0_EMBED_MODEL:-Qwen/Qwen3-Embedding-4B}
      - VLLM_RUNNER=pooling
      - VLLM_TENSOR_PARALLEL_SIZE=${MEM0_EMBED_TENSOR_PARALLEL_SIZE:-1}
      - VLLM_GPU_MEMORY_UTILIZATION=${MEM0_EMBED_GPU_MEMORY_UTILIZATION:-0.2}
      - VLLM_MAX_MODEL_LEN=${MEM0_EMBED_MAX_MODEL_LEN:-8192}
      - VLLM_EXTRA_ARGS=
      - VLLM_TRUST_REMOTE_CODE=${MEM0_EMBED_VLLM_TRUST_REMOTE_CODE:-1}
    ports:
      - "8002:8000"
    volumes:
      - vllm_data:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  vllm_rerank:
    build:
      context: ../..
      dockerfile: deploy/docker/vllm/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
    restart: unless-stopped
    profiles:
      - vllm
    depends_on:
      vllm_embed:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - VLLM_HOST=0.0.0.0
      - VLLM_PORT=8000
      - VLLM_MODEL=${APP_RERANK_VLLM_MODEL:-Qwen/Qwen3-Reranker-4B}
      - VLLM_SERVED_MODEL_NAME=${APP_RERANK_MODEL:-Qwen/Qwen3-Reranker-4B}
      - VLLM_TASK=score
      - VLLM_TENSOR_PARALLEL_SIZE=${APP_RERANK_TENSOR_PARALLEL_SIZE:-1}
      # Must be <= free_vram/total_vram at startup (other vLLM/chat procs on same GPU reduce free VRAM).
      - VLLM_GPU_MEMORY_UTILIZATION=${APP_RERANK_GPU_MEMORY_UTILIZATION:-0.08}
      - VLLM_MAX_MODEL_LEN=${APP_RERANK_MAX_MODEL_LEN:-8192}
      - VLLM_EXTRA_ARGS=
      - VLLM_TRUST_REMOTE_CODE=${APP_RERANK_VLLM_TRUST_REMOTE_CODE:-1}
    ports:
      - "8003:8000"
    volumes:
      - vllm_data:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s


volumes:
  postgres_data:
  minio_data:
  vllm_data:

