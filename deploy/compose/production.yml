
services:
  web:
    build:
      context: ../..
      dockerfile: deploy/docker/web/Dockerfile.prod

    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - C_FORCE_ROOT=1
      - RUN_CELERY_IN_WEB=0
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - VIRTUAL_ENV=/opt/venv
      - PATH=/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      memgraph:
        condition: service_started
        required: false
      vllm:
        condition: service_healthy
        required: false
      vllm_ocr:
        condition: service_healthy
        required: false
      vllm_transcribe:
        condition: service_healthy
        required: false
      vllm_embed:
        condition: service_healthy
        required: false
      vllm_rerank:
        condition: service_healthy
        required: false
    volumes:
      - ../..:/app
      - /app/.venv
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8080}/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/web/Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - C_FORCE_ROOT=1
      - RUN_CELERY_IN_WEB=0
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - VIRTUAL_ENV=/opt/venv
      - PATH=/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      memgraph:
        condition: service_started
        required: false
      vllm:
        condition: service_healthy
        required: false
      vllm_ocr:
        condition: service_healthy
        required: false
      vllm_transcribe:
        condition: service_healthy
        required: false
      vllm_embed:
        condition: service_healthy
        required: false
      vllm_rerank:
        condition: service_healthy
        required: false
    volumes:
      - ../..:/app
      - /app/.venv
    command: sh -c "cd /app/aquillm && /opt/venv/bin/celery -A aquillm worker --loglevel=info"
  
  nginx:
      image: nginx:stable-bookworm
      restart: unless-stopped
      env_file:
        - ../../.env
      ports:
        - "443:443"
        - "80:80"
      volumes:
        - ../../deploy/nginx/nginx.conf:/etc/nginx/nginx.conf
        - ../../deploy/nginx/aquillm.conf.template:/etc/nginx/templates/aquillm.conf.template
        - certs:/etc/letsencrypt
      healthcheck:
        test: ["CMD", "service", "nginx", "status"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 6s
      depends_on:
        web:
          condition: service_healthy

  get_certs:
    build:
      context: ../..
      dockerfile: deploy/docker/certbot/Dockerfile
    profiles:
      - certbot
    ports:
      - "80:80"
    env_file:
      - ../../.env
    volumes:
      - ../../deploy/scripts/get_certs.sh:/get_certs.sh
      - certs:/etc/letsencrypt
      - ../../deploy/scripts/get_certs.cron:/etc/cron.d/get_certs

  db:
    image: pgvector/pgvector:0.8.0-pg17
    restart: unless-stopped
    env_file:
      - ../../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  storage:
    image: minio/minio
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - MINIO_ROOT_USER=dev
      - MINIO_ROOT_PASSWORD=rickbailey
      - MINIO_DEFAULT_BUCKETS=aquillm
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', '-I', 'localhost:9000/minio/health/live']
      interval: 5s
      timeout: 10s
      start_period: 15s
    command: minio server /data --console-address ":9001"

  redis:
    image: redis:7.4-bookworm
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:v1.17
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ${MEM0_QDRANT_DATA_HOST_PATH:-/media/volume/aquillmdev2-vol/mem0/qdrant}:/qdrant/storage

  memgraph:
    image: ${MEM0_MEMGRAPH_IMAGE:-memgraph/memgraph-mage:3.8.1}
    restart: unless-stopped
    profiles:
      - memgraph
    ports:
      - "127.0.0.1:7687:7687"
    volumes:
      - memgraph_data:/var/lib/memgraph

  createbuckets:
    image: minio/mc
    depends_on:
      storage:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set aquillm http://storage:9000 dev rickbailey;
      /usr/bin/mc mb aquillm/aquillm;
      exit 0;"
  
  vllm:
    build:
      context: ../..
      dockerfile: deploy/docker/vllm/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
    restart: unless-stopped
    profiles:
      - vllm
    env_file:
      - ../../.env
    environment:
      - VLLM_HOST=0.0.0.0
      - VLLM_PORT=8000
      - VLLM_GPU_MEMORY_UTILIZATION=${VLLM_GPU_MEMORY_UTILIZATION:-0.33}
      - VLLM_MAX_MODEL_LEN=${VLLM_MAX_MODEL_LEN:-40960}
      - LMCACHE_ENABLED=${LMCACHE_ENABLED:-0}
      - LMCACHE_EXTRA_ARGS=${LMCACHE_EXTRA_ARGS:-}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ${VLLM_CACHE_PATH:-vllm_data}:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 36
      start_period: 120s

  vllm_ocr:
    build:
      context: ../..
      dockerfile: deploy/docker/vllm/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
    restart: unless-stopped
    profiles:
      - vllm
    depends_on:
      vllm:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - VLLM_HOST=0.0.0.0
      - VLLM_PORT=8000
      - VLLM_MODEL=${OCR_VLLM_MODEL:-Qwen/Qwen3.5-4B}
      - VLLM_SERVED_MODEL_NAME=${OCR_VLLM_SERVED_MODEL_NAME:-qwen3.5-ocr}
      - VLLM_TOKENIZER=${OCR_VLLM_TOKENIZER:-Qwen/Qwen3.5-4B}
      - VLLM_TENSOR_PARALLEL_SIZE=${OCR_VLLM_TENSOR_PARALLEL_SIZE:-1}
      - VLLM_GPU_MEMORY_UTILIZATION=${OCR_VLLM_GPU_MEMORY_UTILIZATION:-0.15}
      - VLLM_MAX_MODEL_LEN=${OCR_VLLM_MAX_MODEL_LEN:-4096}
      - "VLLM_EXTRA_ARGS=${OCR_VLLM_EXTRA_ARGS}"
      - VLLM_TRUST_REMOTE_CODE=${OCR_VLLM_TRUST_REMOTE_CODE:-1}
    ports:
      - "127.0.0.1:8004:8000"
    volumes:
      - ${VLLM_CACHE_PATH:-vllm_data}:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 36
      start_period: 120s

  vllm_transcribe:
    build:
      context: ../..
      dockerfile: deploy/docker/vllm/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
    restart: unless-stopped
    profiles:
      - vllm
    depends_on:
      vllm_ocr:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - VLLM_HOST=0.0.0.0
      - VLLM_PORT=8000
      - VLLM_MODEL=${TRANSCRIBE_VLLM_MODEL:-openai/whisper-large-v3-turbo}
      - VLLM_SERVED_MODEL_NAME=${TRANSCRIBE_VLLM_SERVED_MODEL_NAME:-whisper-large-v3-turbo}
      - VLLM_TOKENIZER=${TRANSCRIBE_VLLM_TOKENIZER:-openai/whisper-large-v3-turbo}
      - VLLM_TENSOR_PARALLEL_SIZE=${TRANSCRIBE_VLLM_TENSOR_PARALLEL_SIZE:-1}
      - VLLM_GPU_MEMORY_UTILIZATION=${TRANSCRIBE_VLLM_GPU_MEMORY_UTILIZATION:-0.10}
      - VLLM_MAX_MODEL_LEN=${TRANSCRIBE_VLLM_MAX_MODEL_LEN:-448}
      - "VLLM_EXTRA_ARGS=${TRANSCRIBE_VLLM_EXTRA_ARGS}"
      - VLLM_TRUST_REMOTE_CODE=${TRANSCRIBE_VLLM_TRUST_REMOTE_CODE:-1}
    ports:
      - "127.0.0.1:8005:8000"
    volumes:
      - ${VLLM_CACHE_PATH:-vllm_data}:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 36
      start_period: 120s

  vllm_embed:
    build:
      context: ../..
      dockerfile: deploy/docker/vllm/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
    restart: unless-stopped
    profiles:
      - vllm
    depends_on:
      vllm_transcribe:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - VLLM_HOST=0.0.0.0
      - VLLM_PORT=8000
      - VLLM_MODEL=${MEM0_EMBED_VLLM_MODEL:-Qwen/Qwen3-VL-Embedding-2B}
      - VLLM_SERVED_MODEL_NAME=${MEM0_EMBED_MODEL:-Qwen/Qwen3-VL-Embedding-2B}
      - VLLM_TOKENIZER=${MEM0_EMBED_TOKENIZER:-Qwen/Qwen3-VL-Embedding-2B}
      - VLLM_RUNNER=pooling
      - VLLM_TENSOR_PARALLEL_SIZE=${MEM0_EMBED_TENSOR_PARALLEL_SIZE:-1}
      - VLLM_GPU_MEMORY_UTILIZATION=${MEM0_EMBED_GPU_MEMORY_UTILIZATION:-0.12}
      - VLLM_MAX_MODEL_LEN=${MEM0_EMBED_MAX_MODEL_LEN:-2048}
      - "VLLM_EXTRA_ARGS=${MEM0_EMBED_VLLM_EXTRA_ARGS}"
      - VLLM_TRUST_REMOTE_CODE=${MEM0_EMBED_VLLM_TRUST_REMOTE_CODE:-1}
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - ${VLLM_CACHE_PATH:-vllm_data}:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 36
      start_period: 120s

  vllm_rerank:
    build:
      context: ../..
      dockerfile: deploy/docker/vllm/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
    restart: unless-stopped
    profiles:
      - vllm
    depends_on:
      vllm_embed:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - VLLM_HOST=0.0.0.0
      - VLLM_PORT=8000
      - VLLM_MODEL=${APP_RERANK_VLLM_MODEL:-Qwen/Qwen3-VL-Reranker-2B}
      - VLLM_SERVED_MODEL_NAME=${APP_RERANK_MODEL:-Qwen/Qwen3-VL-Reranker-2B}
      - VLLM_TOKENIZER=${APP_RERANK_TOKENIZER:-Qwen/Qwen3-VL-Reranker-2B}
      - VLLM_TASK=score
      - VLLM_TENSOR_PARALLEL_SIZE=${APP_RERANK_TENSOR_PARALLEL_SIZE:-1}
      # Must be <= free_vram/total_vram at startup (other vLLM/chat procs on same GPU reduce free VRAM).
      - VLLM_GPU_MEMORY_UTILIZATION=${APP_RERANK_GPU_MEMORY_UTILIZATION:-0.25}
      - VLLM_MAX_MODEL_LEN=${APP_RERANK_MAX_MODEL_LEN:-1024}
      - "VLLM_EXTRA_ARGS=${APP_RERANK_VLLM_EXTRA_ARGS}"
      - VLLM_TRUST_REMOTE_CODE=${APP_RERANK_VLLM_TRUST_REMOTE_CODE:-1}
    ports:
      - "127.0.0.1:8003:8000"
    volumes:
      - ${VLLM_CACHE_PATH:-vllm_data}:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 36
      start_period: 120s

volumes:
  postgres_data:
  minio_data:
  certs:
  vllm_data:
  memgraph_data:
