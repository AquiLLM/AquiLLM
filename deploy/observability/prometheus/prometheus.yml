global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: pyroscope
    static_configs:
      - targets: ["pyroscope:4040"]

  - job_name: django-web
    static_configs:
      - targets: ["web:8080"]
    metrics_path: /metrics

  - job_name: celery-exporter
    static_configs:
      - targets: ["celery-exporter:9808"]
