server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Drop web/worker — they push directly to Loki via python-logging-loki
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        regex: "web|worker"
        action: drop
      # Drop db — it uses file-based JSON logging scraped separately below
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        regex: "db"
        action: drop
      # Only scrape containers with a compose service label
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service_name
      - source_labels: ["__meta_docker_container_name"]
        regex: "/?(.*)"
        target_label: container

  # PostgreSQL JSON logs (written by logging_collector to a shared volume)
  - job_name: postgresql
    static_configs:
      - targets: [localhost]
        labels:
          job: postgresql
          service_name: db
          __path__: /var/log/postgresql/*.json
    pipeline_stages:
      - json:
          expressions:
            statement: statement
      - regex:
          source: statement
          expression: "traceparent='00-(?P<trace_id>[a-f0-9]{32})-[a-f0-9]{16}-[a-f0-9]{2}'"
      - structured_metadata:
          trace_id:
